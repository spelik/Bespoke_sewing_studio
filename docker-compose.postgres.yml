services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: bespoke_studio_dev
      POSTGRES_USER: bespoke_user
      POSTGRES_PASSWORD: bespoke_password
    ports:
      - "5433:5432"
    volumes:
      - bespoke_studio_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bespoke_user -d bespoke_studio_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bespoke_studio_postgres_data:
